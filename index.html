<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>הרבץ לנתאי</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= SKY ================= -->

<div id="sky">

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

</div>

<!-- ============== SUN ================= -->

<div id="sun"></div>

<!-- ============== BACKGROUND ============== -->

<div id="background">

    <!-- Mountains -->
    <div class="mountain mountain1"></div>
    <div class="mountain mountain2"></div>
    <div class="mountain mountain3"></div>

    <!-- Trees -->
    <div class="tree tree1"></div>
    <div class="tree tree2"></div>
    <div class="tree tree3"></div>
    <div class="tree tree4"></div>
    <div class="tree tree5"></div>

    <!-- House -->
    <div id="house">

        <div class="roof"></div>

        <div class="houseBody">

            <div class="door"></div>

            <div class="window left"></div>
            <div class="window right"></div>

        </div>

    </div>

    <!-- River -->
    <div id="river"></div>

    <!-- Grass -->

    <div id="grass"></div>

    <!-- Flowers -->

    <div id="flowers"></div>

</div>

<!-- ================= MENU ================= -->

<div id="menu">

    <h1 id="title">
        הרבץ לנתאי
    </h1>

    <p id="subtitle">
        Made By Yhonatan Akiva
    </p>

    <button class="menuButton" id="playButton">
        ▶ שחק
    </button>

    <button class="menuButton">
        ⚙ הגדרות
    </button>

    <button class="menuButton">
        🏆 קרדיטים
    </button>

</div>

<!-- ================= DECORATION ================= -->

<div id="particles"></div>

<div id="birds">
    <div class="bird"></div>
    <div class="bird"></div>
    <div class="bird"></div>
</div>

<div id="butterflies"></div>

<div id="fog"></div>

<!-- ================= FOOTER ================= -->

<footer>

© 2026 Harbetz Lenatai
