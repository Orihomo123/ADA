<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>הרבץ לנתאי</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#79b8ff;
    font-family:'Press Start 2P', cursive;
}

/* Animated pixel background */

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
    linear-gradient(#6ac4ff 70%, #45b049 70%);
    z-index:-3;
}

body::after{
    content:"";
    position:absolute;
    width:300%;
    height:100%;
    background-image:
    radial-gradient(circle,#ffffff 25%,transparent 26%);
    background-size:120px 60px;
    opacity:.35;
    animation:clouds 40s linear infinite;
    z-index:-2;
}

@keyframes clouds{
    from{transform:translateX(0);}
    to{transform:translateX(-900px);}
}

/* Title */

.title{
    width:100%;
    text-align:center;
    margin-top:50px;
    color:white;
    font-size:55px;
    text-shadow:
    5px 5px #000,
    10px 10px #4a4a4a;
    animation:bounce 2s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
}

/* Menu */

.menu{
    position:absolute;
    left:50%;
    top:55%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    gap:25px;
}

/* Pixel Button */

.pixelButton{

    width:320px;
    padding:22px;

    background:#ffde59;

    border:none;

    color:#222;

    font-size:18px;

    font-family:'Press Start 2P';

    cursor:pointer;

    box-shadow:
    0 8px #d39f00,
    8px 0 #d39f00,
    -8px 0 #fff5a4,
    0 -8px #fff5a4;

    transition:.12s;
}

.pixelButton:hover{

    transform:translateY(-5px) scale(1.05);

    background:#ffd633;

}

.pixelButton:active{

    transform:translateY(6px);

    box-shadow:
    0 2px #d39f00;

}

/* Footer */

.footer{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    color:white;
    font-size:12px;
    text-shadow:3px 3px black;
}

</style>

</head>
<body>

<div class="title">
הרבץ לנתאי
</div>

<div class="menu">

<button class="pixelButton" onclick="playGame()">
🎮 שחק!
</button>

<button class="pixelButton">
⚙ הגדרות
</button>

<button class="pixelButton">
📜 קרדיטים
</button>

</div>

<div class="footer">
Made By Yhonatan Akiva
</div>

<script>

function playGame(){

alert("המשחק עדיין בבנייה!");

}

</script>

</body>
</html>
